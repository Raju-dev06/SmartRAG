spring.application.name=rag-gemini
cohere.api.key=
# Gemini API
gemini.api.key=${GEMINI_API_KEY}

# Supabase DB
spring.datasource.url=${DB_URL}

spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

logging.level.org.apache.pdfbox=ERROR
logging.level.org.apache.fontbox=ERROR

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.datasource.hikari.data-source-properties.prepareThreshold=0

logging.level.root=ERROR

server.port=${PORT:8080}
# Spring AI OpenAI configuration mapped to Gemini API
spring.ai.openai.api-key=${GEMINI_API_KEY}
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai/
spring.ai.openai.chat.options.model=gemini-2.5-flash

